homeIntroHtml: |
  <p>
    To Shape the Future of Intelligence Beyond the Digital World.
  </p>
  <p>
    Hi, I am Xu Pan, an incoming Research Associate at the
    <a class="cactus-link" href="https://pine-lab-ntu.github.io/" target="_blank" rel="noopener">Perception and Embodied Intelligence (PINE) Lab</a>,
    supervised by
    <a class="cactus-link" href="https://ziweiwangthu.github.io/" target="_blank" rel="noopener">Prof. Ziwei Wang</a>,
    within the
    <a class="cactus-link" href="https://www.ntu.edu.sg/eee" target="_blank" rel="noopener">School of Electrical and Electronic Engineering (EEE)</a>,
    {{logo:ntu|NTU logo|16}}
    <a class="cactus-link" href="https://www.ntu.edu.sg/" target="_blank" rel="noopener">Nanyang Technological University (NTU)</a>.
    My research focuses on <em class="highlight">embodied intelligence</em>,
    with an emphasis on <em class="highlight">spatial representations</em> that enable
    <em class="highlight">generalizable perception-action coupling</em> for embodied agents.
  </p>

  <p>
    I study how <em class="highlight">structure-aware representations</em> can support robust interaction,
    enabling agents to generalize across diverse environments, viewpoints, and embodiments,
    with a particular interest in agent-centric policy learning and spatial reasoning.
  </p>

  <p>
    Previously, I received my B.Eng. and M.Sc. degrees from
    {{logo:whu|Wuhan University logo|16}}
    <a class="cactus-link" href="https://en.whu.edu.cn/" target="_blank" rel="noopener">Wuhan University</a>,
    where I worked at the
    {{logo:liesmars|LIESMARS logo|16}}
    <a class="cactus-link" href="https://liesmars.whu.edu.cn/" target="_blank" rel="noopener">State Key Laboratory of Information Engineering in Surveying, Mapping and Remote Sensing (LIESMARS)</a>.
    I also interned at
    {{logo:baidu|Baidu logo|16}}
    <a class="cactus-link" href="https://www.baidu.com/" target="_blank" rel="noopener">Baidu</a>,
    and was a remote Research Assistant at the
    {{logo:astar|A*STAR logo|16}}
    <a class="cactus-link" href="https://www.a-star.edu.sg/cfar" target="_blank" rel="noopener">Centre for Frontier AI Research (CFAR), Agency for Science, Technology and Research (A*STAR)</a>,
    working with
    <a class="cactus-link" href="https://xingruiyu.github.io/" target="_blank" rel="noopener">Dr. Xingrui Yu</a>.
  </p>

  <p>
    More broadly, I aim to develop <em class="highlight">scalable and generalizable learning frameworks</em>
    that advance spatial intelligence and enable embodied systems to operate reliably in complex real-world settings.
  </p>
  <p></p>

personalPhilosophyHtml: |
  <p>
    I follow Stoic philosophy. Life is a joyful ascent: a true mountaineer delights in the climb itself, not just the summit.
  </p>

  <figure class="philosophy-quote">
    <blockquote>
      Thou sufferest this justly: for thou choosest rather to become good to-morrow than to be good to-day.
    </blockquote>
    <figcaption>
      — Marcus Aurelius, <a class="cactus-link" href="https://classics.mit.edu/Antoninus/meditations.8.eight.html#:~:text=Thou%20sufferest%20this%20justly%3A%20for%20thou%20choosest%20rather%20to%20become%20good%20to%2Dmorrow%20than%20to%20be%20good%20to%2Dday." target="_blank" rel="noopener"><em>Meditations</em> 8.22</a>
