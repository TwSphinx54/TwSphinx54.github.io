  <p>
    I also resonate with the spirit of
    <a class="cactus-link" href="http://slow-science.org/" target="_blank" rel="noopener">Slow Science</a>.
  </p>

  <p>
    We live in an age tyrannized by efficiency, outcomes, and speed, to the point that nothing lasts and nothing leaves a deep impression. 
    In the midst of noisy bubbles and short-lived hype, I hope to take time to think carefully, to doubt, to refine, and to do research that is genuinely meaningful and worth remembering.
  </p>